<div class="dashboard-container">
  <header style="background-color: #2c3e50; color: white; padding: 15px;">
    <h2>System Administrator Dashboard</h2>
    <button (click)="logOut()" class="primary-btn">
        Logout
        <span style="display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; background-color: var(--brand-accent); border-radius: 50%; margin-left: 4px;">
            <svg style="width: 10px; height: 10px; color: white;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        </span>
    </button>
  </header>

  <div *ngIf="isLoading" class="skeleton-container">
    <div class="skeleton-row header"></div>
    <div class="skeleton-row" style="width: 100%;"></div>
    <div class="skeleton-row" style="width: 85%;"></div>
    <div class="skeleton-row" style="width: 95%;"></div>
  </div>

  <div *ngIf="!isLoading">
    <div class="table-controls">
      <div class="search-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        
        <input 
          type="text" 
          placeholder="Search by User ID, Name or Email..." 
          (input)="filterUsers($event)"
          class="search-input"
        >
      </div>
      <div class="record-count">
        Showing {{ displayedUsers.length }} of {{ users.length }}
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>User ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>System Role</th>
          <th>Created At</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of displayedUsers">
          <td><strong>{{ user.userId }}</strong></td>
          <td>{{user.fullName}}</td>
          <td>{{user.email}}</td>
          <td>
            <span [style.color]="user.role === 'Admin' ? 'var(--brand-accent)' : 'inherit'">
              {{ user.role }}
            </span>
          </td>
          <td>{{user.createdAt | date:'mediumDate'}}</td>
        </tr>
        
        <tr *ngIf="displayedUsers.length === 0">
          <td colspan="2" style="text-align: center; padding: 40px; color: var(--text-muted);">
            No users match your search criteria.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
