<div class="login-container">
  <h2>Login</h2>
  
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div>
      <label for="userId">User ID:</label>
      <input id="userId" type="text" formControlName="userId">
    </div>
    <div>
  <label for="password">Password:</label>
  <div class="password-wrapper">
    <input 
      id="password" 
      [type]="isPasswordVisible ? 'text' : 'password'" 
      formControlName="password"
    >
    <button 
      type="button" 
      class="password-toggle-btn" 
      (click)="togglePasswordVisibility()"
      aria-label="Toggle password visibility"
    >
      <svg *ngIf="!isPasswordVisible" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
        <line x1="1" y1="1" x2="23" y2="23"></line>
      </svg>
      <svg *ngIf="isPasswordVisible" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
    </button>
  </div>
</div>
    
    <div *ngIf="errorMessage" class="error-msg">
      {{ errorMessage }}
    </div>

    <div class="button-container">
        <button type="submit" class="primary-btn" [disabled]="isLoading">
            {{ isLoading ? 'Authenticating...' : 'Log In' }}
            <span *ngIf="!isLoading" style="display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; background-color: var(--brand-accent); border-radius: 50%; margin-left: 4px;">
                <svg style="width: 10px; height: 10px; color: white;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M9 5l7 7-7 7"></path></svg>
            </span>
        </button>
    </div>

    <div style="text-align: center; margin-top: 30px;">
      <a routerLink="/auth/register" class="forgot-password" style="text-decoration: none;">
        Don't have an account? Register
      </a>
    </div>
  </form>
</div>
