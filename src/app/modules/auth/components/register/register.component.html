<main class="login-container">
  <h2>Create Account</h2>

  <form (ngSubmit)="onSubmit()" #registerForm="ngForm">

    <div>
      <label for="reg-fullname">Full Name</label>
      <input 
        id="reg-fullname" 
        type="text" 
        [(ngModel)]="userData.fullName" 
        name="fullName" 
        placeholder="e.g. Jane Doe"
        required
      >
    </div>

    <div>
      <label for="reg-email">Corporate Email</label>
      <input 
        id="reg-email" 
        type="text" 
        [(ngModel)]="userData.email" 
        name="email" 
        placeholder="name@company.com"
        required
      >
    </div>
    
    <div>
      <label for="reg-userId">User ID</label>
      <input 
        id="reg-userId" 
        type="text" 
        [(ngModel)]="userData.userId" 
        name="userId" 
        placeholder="Choose a username"
        required
      >
    </div>

    <div>
      <label for="reg-password">Password</label>
      <div class="password-wrapper">
        <input 
          id="reg-password" 
          [type]="isPasswordVisible ? 'text' : 'password'" 
          [(ngModel)]="userData.password" 
          name="password" 
          placeholder="••••••••"
          required
        >
        <button type="button" class="password-toggle-btn" (click)="togglePasswordVisibility()">
          <svg *ngIf="!isPasswordVisible" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
          <svg *ngIf="isPasswordVisible" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
      </div>
    </div>

    <div>
      <label for="reg-confirm">Confirm Password</label>
      <div class="password-wrapper">
        <input 
          id="reg-confirm" 
          [type]="isPasswordVisible ? 'text' : 'password'" 
          [(ngModel)]="userData.confirmPassword" 
          name="confirmPassword" 
          placeholder="••••••••"
          required
        >
      </div>
    </div>

    <div class="button-container">
      <button type="submit" class="primary-btn" [disabled]="isLoading">
        {{ isLoading ? 'Creating...' : 'Register' }}
      </button>
    </div>

    <div style="text-align: center; margin-top: 30px;">
      <a routerLink="/auth/login" class="forgot-password" style="text-decoration: none;">
        Already have an account? Log In
      </a>
    </div>
  </form>
</main>
